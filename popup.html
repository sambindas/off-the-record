<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 260px;
      padding: 14px;
      color: #1f2937;
    }
    h2 {
      font-size: 14px;
      margin: 0 0 10px;
    }
    #current-host {
      font-size: 13px;
      color: #4f46e5;
      word-break: break-all;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 8px 10px;
      border: none;
      border-radius: 6px;
      background: #4f46e5;
      color: white;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 8px;
    }
    button.remove {
      background: #ef4444;
    }
    button:hover {
      opacity: 0.9;
    }
    a {
      display: block;
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      margin-top: 8px;
    }
    .stat {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <h2>Off the Record</h2>
  <div id="current-host">Loading…</div>
  <button id="toggle-btn">…</button>
  <div class="stat" id="stat"></div>
  <a href="#" id="open-options">Manage all sites</a>
</body>
<script src="popup.js"></script>
</html>
